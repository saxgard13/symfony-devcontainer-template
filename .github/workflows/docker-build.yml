name: Docker Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-dev:
    name: Build Development Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.dev
          push: false
          tags: devcontainer:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-apache-prod:
    name: Build Apache Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create backend directory (if not exists)
        run: mkdir -p backend

      - name: Create backend files for build context
        run: |
          echo '{"name":"symfony/project","type":"project","require":{}}' > backend/composer.json
          echo '{"_readme":["This file is @generated automatically"],"content-hash":"da41eaf87ccf6f6f6f6f6f6f6f6f6f6f","packages":[],"packages-dev":[],"aliases":[],"minimum-stability":"stable","stability-flags":{},"prefer-stable":false,"prefer-lowest":false,"platform":{},"platform-dev":{},"plugin-api-version":"2.3.0"}' > backend/composer.lock

      - name: Build Apache prod image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.apache.prod
          push: false
          tags: devcontainer:apache-prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-node-prod:
    name: Build Node.js Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create frontend directory (if not exists)
        run: mkdir -p frontend

      - name: Create frontend files for build context
        run: |
          echo '{ "name": "frontend", "version": "1.0.0", "scripts": { "build": "echo build" }, "dependencies": {} }' > frontend/package.json
          echo '{ "name": "frontend", "version": "1.0.0", "lockfileVersion": 3, "requires": true, "packages": {} }' > frontend/package-lock.json

      - name: Build Node.js prod image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.node.prod
          push: false
          tags: devcontainer:node-prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-spa-prod:
    name: Build SPA Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create frontend directory (if not exists)
        run: mkdir -p frontend

      - name: Create frontend files for build context
        run: |
          echo '{ "name": "frontend", "scripts": { "build": "mkdir -p dist && echo Build output > dist/index.html" } }' > frontend/package.json
          echo '{ "name": "frontend", "version": "1.0.0", "lockfileVersion": 3, "requires": true, "packages": {} }' > frontend/package-lock.json

      - name: Build SPA prod image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.spa.prod
          push: false
          tags: devcontainer:spa-prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint on Dockerfile.dev
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: .devcontainer/Dockerfile.dev
          ignore: DL3003,DL3008,DL3009,DL3022,DL4006,SC3040

      - name: Run Hadolint on Dockerfile.apache.prod
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: .devcontainer/Dockerfile.apache.prod
          ignore: DL3003,DL3008,DL3009,DL3022,DL4006,SC3040

      - name: Run Hadolint on Dockerfile.node.prod
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: .devcontainer/Dockerfile.node.prod
          ignore: DL3003,DL3008,DL3009,DL3022,DL4006,SC3040

      - name: Run Hadolint on Dockerfile.spa.prod
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: .devcontainer/Dockerfile.spa.prod
          ignore: DL3003,DL3008,DL3009,DL3022,DL4006,SC3040

  validate-compose:
    name: Validate Docker Compose Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create required directories and stub files
        run: |
          mkdir -p backend frontend
          touch backend/composer.json backend/composer.lock
          touch frontend/package.json frontend/package-lock.json

      # docker-compose.dev.yml requires db + redis + mailpit — always include all three
      - name: Validate dev + mysql (base stack)
        run: docker compose -f .devcontainer/docker-compose.dev.yml -f .devcontainer/docker-compose.mysql.yml -f .devcontainer/docker-compose.redis.yml -f .devcontainer/docker-compose.mailpit.yml config --quiet

      - name: Validate dev + postgre (base stack)
        run: docker compose -f .devcontainer/docker-compose.dev.yml -f .devcontainer/docker-compose.postgre.yml -f .devcontainer/docker-compose.redis.yml -f .devcontainer/docker-compose.mailpit.yml config --quiet

      - name: Validate dev + mysql + reverseproxy
        run: docker compose -f .devcontainer/docker-compose.dev.yml -f .devcontainer/docker-compose.mysql.yml -f .devcontainer/docker-compose.redis.yml -f .devcontainer/docker-compose.mailpit.yml -f .devcontainer/docker-compose.reverseproxy.yml config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f .devcontainer/docker-compose.prod.yml config --quiet

      - name: Validate docker-compose.node.prod.yml
        run: docker compose -f .devcontainer/docker-compose.node.prod.yml config --quiet

      - name: Validate docker-compose.frontend.prod.yml
        run: docker compose -f .devcontainer/docker-compose.frontend.prod.yml config --quiet

  lint-shell-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint init.sh
        run: shellcheck --severity=warning .devcontainer/init.sh

      - name: Lint setup.sh
        run: shellcheck --severity=warning .devcontainer/setup.sh

      - name: Lint Caddy entrypoint.sh
        run: shellcheck --severity=warning .devcontainer/config/caddy/entrypoint.sh
